<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="40" height="40" fill="#080808"/>

  <!-- Gift-tag teardrop: round top, point at bottom = the "Drop" -->
  <path
    d="M20 37
       C11 30 5 23 5 15
       C5 6.2 11.8 1 20 1
       C28.2 1 35 6.2 35 15
       C35 23 29 30 20 37 Z"
    fill="#FFE234"
  />

  <!-- String hole: makes it a gift tag -->
  <circle cx="20" cy="9.5" r="3.6" fill="#080808"/>

  <!-- Gift ribbon — vertical strip -->
  <rect x="18.6" y="13" width="2.8" height="22" fill="#080808"/>

  <!-- Gift ribbon — horizontal strip -->
  <rect x="7.5" y="20.5" width="25" height="2.8" fill="#080808"/>

  <!-- Tiny star tip at the point for personality -->
  <polygon points="20,34 20.6,35.8 22.5,35.8 21,37 21.6,38.8 20,37.7 18.4,38.8 19,37 17.5,35.8 19.4,35.8" fill="#080808" opacity="0.25"/>
</svg>
