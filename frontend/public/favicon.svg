<svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="40" height="40" fill="#080808"/>

  <!-- Gift body -->
  <rect x="7" y="24" width="26" height="14" rx="1.5" fill="#FFE234"/>

  <!-- Gift lid (slightly wider) -->
  <rect x="5" y="19" width="30" height="5" rx="1.5" fill="#FFE234"/>

  <!-- Ribbon (vertical) -->
  <rect x="18.5" y="19" width="3" height="19" fill="#080808"/>

  <!-- Bow left loop -->
  <path d="M18.5 20 C18.5 17 11 15.5 11 18.5 C11 21.5 16 22 18.5 20Z" fill="#080808"/>

  <!-- Bow right loop -->
  <path d="M21.5 20 C21.5 17 29 15.5 29 18.5 C29 21.5 24 22 21.5 20Z" fill="#080808"/>

  <!-- Bow knot -->
  <circle cx="20" cy="20" r="2" fill="#FFE234"/>
  <circle cx="20" cy="20" r="1" fill="#080808"/>

  <!-- Motion trail (coin dropping) -->
  <circle cx="20" cy="12" r="1.1" fill="#FFE234" opacity="0.65"/>
  <circle cx="20" cy="14" r="0.7" fill="#FFE234" opacity="0.35"/>

  <!-- Coin body -->
  <circle cx="20" cy="6" r="4" fill="#FFE234"/>

  <!-- Coin inner ring -->
  <circle cx="20" cy="6" r="2.5" fill="none" stroke="#080808" stroke-width="1.3"/>
</svg>
